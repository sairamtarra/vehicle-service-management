<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Booking</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
	<div class="container mt-4">
		<h2>Add New Booking</h2>

		<form th:action="@{/saveBooking}" th:object="${booking}" method="post">

			<div class="mb-3">
				<label>Customer Name</label> <input type="text"
					th:field="*{customerName}" class="form-control"> <small
					class="text-danger" th:if="${#fields.hasErrors('customerName')}"
					th:errors="*{customerName}"></small>
			</div>

			<div class="mb-3">
				<label>Vehicle Number</label> <input type="text"
					th:field="*{vehicleNumber}" class="form-control"> <small
					class="text-danger" th:if="${#fields.hasErrors('vehicleNumber')}"
					th:errors="*{vehicleNumber}"></small>
			</div>

			<div class="mb-3">
				<label>Vehicle Type</label> <select th:field="*{vehicleType}"
					class="form-control">
					<option value="Car">Car</option>
					<option value="Bike">Bike</option>
				</select>
			</div>

			<div class="mb-3">
				<label>Service Type</label> <select th:field="*{serviceType}"
					class="form-control">
					<option value="Oil Change">Oil Change</option>
					<option value="Engine Repair">Engine Repair</option>
					<option value="Full Service">Full Service</option>
					<option value="Tyre Replacement">Tyre Replacement</option>
				</select>
			</div>

			<div class="mb-3">
				<label>Booking Date</label> <input type="date"
					th:field="*{bookingDate}" class="form-control">
			</div>

			<div class="mb-3">
				<label>Status</label> <select th:field="*{status}"
					class="form-control">
					<option value="Pending">Pending</option>
					<option value="In Progress">In Progress</option>
					<option value="Completed">Completed</option>
				</select>
			</div>

			<button type="submit" class="btn btn-success">Save Booking</button>
			<a th:href="@{/}" class="btn btn-secondary">Back</a>

		</form>
	</div>
</body>
</html>
