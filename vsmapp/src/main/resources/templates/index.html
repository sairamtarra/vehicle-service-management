<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Vehicle Service Center</title>

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body>
	<div class="container mt-4">

		<h2 class="text-center">🚗 Vehicle Service Center Management</h2>

		<a th:href="@{/showNewBookingForm}" class="btn btn-primary mt-3 mb-3">
			Add New Booking </a>

		<!-- Search + Filter Form -->
		<form th:action="@{/}" method="get" class="row g-3 mb-3">
			<div class="col-md-4">
				<input type="text" name="vehicleNumber" class="form-control"
					placeholder="Search by Vehicle Number" th:value="${vehicleNumber}">
			</div>

			<div class="col-md-4">
				<select name="status" class="form-control">
					<option value="">-- Filter by Status --</option>
					<option value="Pending" th:selected="${status=='Pending'}">Pending</option>
					<option value="In Progress" th:selected="${status=='In Progress'}">In
						Progress</option>
					<option value="Completed" th:selected="${status=='Completed'}">Completed</option>
				</select>
			</div>

			<div class="col-md-4">
				<button type="submit" class="btn btn-success">Search</button>
				<a th:href="@{/}" class="btn btn-secondary">Reset</a>
			</div>

		</form>

		<!-- Table -->
		<table class="table table-bordered table-striped">
			<thead class="table-dark">
				<tr>
					<th>ID</th>
					<th>Customer</th>
					<th>Vehicle No</th>
					<th>Type</th>
					<th>Service</th>
					<th>Date</th>
					<th>Status</th>
					<th>Actions</th>
				</tr>
			</thead>

			<tbody>
				<tr th:each="b : ${listBookings}">
					<td th:text="${b.bookingId}"></td>
					<td th:text="${b.customerName}"></td>
					<td th:text="${b.vehicleNumber}"></td>
					<td th:text="${b.vehicleType}"></td>
					<td th:text="${b.serviceType}"></td>
					<td th:text="${b.bookingDate}"></td>
					<td th:text="${b.status}"></td>

					<td><a th:href="@{/showFormForUpdate/{id}(id=${b.bookingId})}"
						class="btn btn-warning btn-sm">Update</a> <a
						th:href="@{/deleteBooking/{id}(id=${b.bookingId})}"
						class="btn btn-danger btn-sm"
						onclick="return confirm('Are you sure want to delete?')">
							Delete </a></td>
				</tr>
			</tbody>
		</table>

		<!-- Pagination -->
		<nav>
			<ul class="pagination">

				<li class="page-item" th:if="${currentPage > 0}"><a
					class="page-link"
					th:href="@{/(page=${currentPage-1},vehicleNumber=${vehicleNumber},status=${status})}">
						Previous </a></li>

				<li class="page-item"
					th:each="i : ${#numbers.sequence(0,totalPages-1)}"
					th:classappend="${currentPage==i} ? 'active'"><a
					class="page-link"
					th:href="@{/(page=${i},vehicleNumber=${vehicleNumber},status=${status})}"
					th:text="${i+1}"> </a></li>

				<li class="page-item" th:if="${currentPage < totalPages-1}"><a
					class="page-link"
					th:href="@{/(page=${currentPage+1},vehicleNumber=${vehicleNumber},status=${status})}">
						Next </a></li>

			</ul>
		</nav>

	</div>
